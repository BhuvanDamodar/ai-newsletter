services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ainews_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ainews_password}
      POSTGRES_DB: ${POSTGRES_DB:-ainews}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ainews_user} -d ${POSTGRES_DB:-ainews}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ainews_user}:${POSTGRES_PASSWORD:-ainews_password}@db:5432/${POSTGRES_DB:-ainews}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gemini/gemini-pro} # Recommending Gemini Free by default to avoid OpenAI costs
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@ainews.local}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    command: python -m app.main

volumes:
  postgres_data: